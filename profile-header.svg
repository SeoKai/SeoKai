<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg" width="800" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="800" height="180" fill="#0d1117" rx="12"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="#1D9E75" rx="2"/>

  <!-- name -->
  <text x="400" y="68" text-anchor="middle" font-size="32" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">심성완 · Seong-wan Sim</text>

  <!-- tagline -->
  <text x="400" y="100" text-anchor="middle" font-size="14" fill="#8b949e">Software Developer · Changwon, KR</text>

  <!-- monospace pill -->
  <rect x="300" y="114" width="200" height="28" fill="#161b22" rx="6"/>
  <text x="400" y="132" text-anchor="middle" font-size="12" fill="#1D9E75" font-family="'Courier New', monospace">「人の一生はどこまでいっても一筆書きだ。」</text>

  <!-- bottom divider -->
  <line x1="40" y1="170" x2="760" y2="170" stroke="#21262d" stroke-width="1"/>
</svg>
